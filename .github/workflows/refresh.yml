name: Update prelim
on:
  schedule:
    # Run monthly on the 1st at 03:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests pyyaml
      - name: Run monthly literature refresh
        run: |
          python scripts/refresh_prelim.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: monthly literature refresh $(date -u +%Y-%m-%d)"
          git push
